# AI PR Review Agent policy.
# fail_on controls CI gate behavior: low, medium, high, critical.
fail_on: high

# Rules listed here are removed from final reports and risk scoring.
ignore_rules: []

# Glob patterns matched against normalized file paths.
ignore_paths:
  - "docs/**"
  - "*.md"

# Team-owned rules for private risk gates. Each pattern is matched literally
# against added diff lines before built-in rules run.
custom_rules:
  - id: team_no_pickle_loads
    pattern: "pickle.loads"
    severity: high
    message: "Team policy forbids unsafe pickle deserialization in PR changes."
