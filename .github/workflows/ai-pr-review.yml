name: AI PR Review

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  review:
    name: Run local AI PR review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests

      - name: Build pull request diff
        if: github.event_name == 'pull_request'
        run: |
          git diff --unified=3 \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" > pr.diff

      - name: Build workflow dispatch diff
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --unified=3 HEAD~1 HEAD > pr.diff
          else
            : > pr.diff
          fi

      - name: Generate review artifacts
        env:
          PYTHONPATH: src
          PYTHONIOENCODING: utf-8
        run: |
          python -m ai_pr_review_agent.cli --diff-file pr.diff --config .ai-pr-review.yml --format markdown > ai-pr-review.md
          python -m ai_pr_review_agent.cli --diff-file pr.diff --config .ai-pr-review.yml --format json > ai-pr-review.json
          python -m ai_pr_review_agent.cli --diff-file pr.diff --config .ai-pr-review.yml --format sarif > ai-pr-review.sarif

      - name: Publish review summary
        run: cat ai-pr-review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish pull request comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ai-pr-review-agent -->';
            const maxBodyLength = 60000;
            let report = fs.readFileSync('ai-pr-review.md', 'utf8');
            if (report.length > maxBodyLength) {
              report = `${report.slice(0, maxBodyLength)}\n\n_Report truncated. Download the full artifact for complete output._`;
            }
            const body = `${marker}\n${report}\n\n---\nGenerated by AI PR Review Agent.`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-pr-review-results
          path: |
            pr.diff
            ai-pr-review.md
            ai-pr-review.json
            ai-pr-review.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ai-pr-review.sarif

      - name: Enforce risk gate
        env:
          PYTHONPATH: src
          PYTHONIOENCODING: utf-8
        run: python -m ai_pr_review_agent.cli --diff-file pr.diff --config .ai-pr-review.yml --enforce-policy > /tmp/ai-pr-review-gate.md
